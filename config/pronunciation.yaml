# Default pronunciation dictionary for claude-call.
#
# Serves two purposes:
#   1. TTS: text is rewritten before synthesis (e.g., "SQL" → "S Q L")
#   2. STT: keys are used as vocabulary hints for Whisper
#
# Categories are organizational only — all entries are flattened.
# Entries are case-insensitive, whole-word matches.
#
# Override with your own file via:
#   CLAUDE_CALL_PRONUNCIATION_FILE=/path/to/custom.yaml
#   or pronunciation.file in ~/.claude-call/config.yaml

tech:
  TypeScript: "Type Script"
  JavaScript: "Java Script"
  PostgreSQL: "Postgres Q L"
  MySQL: "My S Q L"
  GraphQL: "Graph Q L"
  Kubernetes: "Koo-ber-net-ees"
  kubectl: "koob-control"
  nginx: "engine-X"
  OAuth: "oh-auth"
  OAuth2: "oh-auth two"

